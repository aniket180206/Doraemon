<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ishi Birthday Magic 🎀</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Pacifico&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:'Poppins',sans-serif;
height:100vh;
background:linear-gradient(135deg,#ffc4dd,#ffd6ec,#ffeaf6);
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

/* floating hearts */
.heart{
position:absolute;
animation:float 10s linear infinite;
opacity:.8;
}

@keyframes float{
0%{transform:translateY(100vh) scale(.5);opacity:0}
40%{opacity:1}
100%{transform:translateY(-10vh) scale(1.4);opacity:0}
}

.container{
background:rgba(255,255,255,0.85);
backdrop-filter:blur(14px);
padding:55px 45px;
border-radius:30px;
box-shadow:0 25px 55px rgba(0,0,0,.18);
text-align:center;
max-width:600px;
position:relative;
}

h1{
font-family:'Pacifico',cursive;
font-size:44px;
color:#ff3f8e;
margin-bottom:10px;
}

.subtitle{
color:#ff6fa5;
margin-bottom:25px;
font-size:18px;
}

#timer{
font-size:36px;
font-weight:600;
color:#ff3f8e;
margin:25px 0;
}

button{
background:linear-gradient(135deg,#ff69b4,#ff3f8e);
border:none;
color:white;
padding:17px 34px;
font-size:19px;
border-radius:40px;
cursor:pointer;
transition:.3s;
box-shadow:0 10px 30px rgba(255,77,148,.45);
}

button:hover{transform:scale(1.08)}

button:disabled{
background:#ddd;
box-shadow:none;
