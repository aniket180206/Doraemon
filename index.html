<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ishi Turns 6 🎀</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Pacifico&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#ffc6e0,#ffdff0,#ffeef7);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.container{
background:rgba(255,255,255,0.9);
backdrop-filter:blur(15px);
padding:50px;
border-radius:30px;
box-shadow:0 25px 60px rgba(0,0,0,.15);
max-width:700px;
text-align:center;
}

h1{
font-family:'Pacifico',cursive;
font-size:42px;
color:#ff3f8e;
margin-bottom:10px;
}

.subtitle{color:#ff6fa5;margin-bottom:20px}

#timer{
font-size:32px;
font-weight:600;
margin:25px 0;
color:#ff3f8e;
}

button{
background:linear-gradient(135deg,#ff69b4,#ff3f8e);
border:none;
color:white;
padding:16px 30px;
font-size:18px;
border-radius:40px;
cursor:pointer;
box-shadow:0 10px 25px rgba(255,77,148,.4);
transition:.3s;
margin:10px;
}

button:hover{transform:scale(1.08)}

button:disabled{
background:#ddd;
box-shadow:none;
cursor:not-allowed;
}

/* slideshow */
.slideshow{
margin-top:25px;
position:relative;
height:260px;
overflow:hidden;
border-radius:20px;
}

.slide{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opactiy:0;
transition:opacity 1s;
}

.slide.active{opacity:1}

/* gift */
.gift-box{
font-size:70px;
margin:15px 0;
animation:bounce 1.2s infinite alternate;
}

@keyframes bounce{
from{transform:translateY(0)}
to{transform:translateY(-12px)}
}

/* cake */
.cake-area{margin-top:20px;font-size:90px;cursor:pointer}

/* floating hearts */
.heart{
position:absolute;
animation:float 10s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh) scale(.5);opacity:0}
40%{opacity:1}
100%{transform:translateY(-10vh) scale(1.3);opacity:0}
}

/* confetti */
.confetti{
position:fixed;
width:10px;
height:10px;
top:-10px;
animation:fall 3s linear forwards;
}

@keyframes fall{
to{transform:translateY(110vh) rotate(720deg)}
}

.secret{
display:none;
margin-top:20px;
font-size:22px;
color:#ff1493;
}

.footer{margin-top:25px;font-size:13px;color:#888}

</style>
</head>

<body>

<div class="container">

<h1>Ishi Turns 6 🎂</h1>
<div class="subtitle">A magical birthday surprise for you 💖</div>

<div class="gift-box">🎁</div>

<div id="timer"></div>

<button id="giftBtn" disabled>Open Surprise Gift</button>
<button id="secretBtn" style="display:none">Open Secret Message 💌</button>

<div class="slideshow" id="slideshow">

<!-- ADD YOUR PHOTOS HERE -->
<img src="photo1.jpg" class="slide active">
<img src="photo2.jpg" class="slide">
<img src="photo3.jpg" class="slide">

</div>

<div class="cake-area" id="cake"></div>

<div class="secret" id="secretMsg">
You are the sweetest girl in the world 🌸💖 Happy 6th Birthday Ishi!
</div>

<div class="footer">Made with 💗 for Ishi</div>

</div>

<script>

/* hearts */
setInterval(()=>{
const heart=document.createElement("div")
heart.className="heart"
heart.innerHTML=["💗","💖","💕","💘"][Math.floor(Math.random()*4)]
heart.style.left=Math.random()*100+"vw"
heart.style.fontSize=(18+Math.random()*26)+"px"
document.body.appendChild(heart)
setTimeout(()=>heart.remove(),10000)
},400)

/* countdown */
const birthday=new Date("March 22, 2026 00:00:00").getTime()
const btn=document.getElementById("giftBtn")
const timer=setInterval(()=>{

const now=new Date().getTime()
const distance=birthday-now

const d=Math.floor(distance/(1000*60*60*24))
const h=Math.floor((distance%(1000*60*60*24))/(1000*60*60))
const m=Math.floor((distance%(1000*60*60))/(1000*60))
const s=Math.floor((distance%(1000*60))/1000)

if(distance>0){
document.getElementById("timer").innerHTML=`${d}d ${h}h ${m}m ${s}s`
}

if(distance<0){
clearInterval(timer)
document.getElementById("timer").innerHTML="🎉 It's Your Birthday!"
btn.disabled=false
}

},1000)

/* slideshow */
let slideIndex=0
setInterval(()=>{
const slides=document.querySelectorAll(".slide")
slides.forEach(s=>s.classList.remove("active"))
slideIndex=(slideIndex+1)%slides.length
slides[slideIndex].classList.add("active")
},3000)

/* gift click */
btn.onclick=()=>{

const cake=document.getElementById("cake")
const secretBtn=document.getElementById("secretBtn")

cake.innerHTML="🎂 (Click cake to blow candles)"
secretBtn.style.display="inline-block"

for(let i=0;i<160;i++){
const c=document.createElement("div")
c.className="confetti"
c.style.left=Math.random()*100+"vw"
c.style.background=`hsl(${Math.random()*360},70%,60%)`
c.style.animationDuration=(2+Math.random()*2)+"s"
document.body.appendChild(c)
setTimeout(()=>c.remove(),3000)
}

}

/* blow candles */
document.addEventListener("click",e=>{
if(e.target.id==="cake"){

e.target.innerHTML="🧁 Candles blown! Make a wish ✨"

const audio=new Audio("https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3")
audio.volume=0.2

audio.play()

}
})

/* secret message */
document.getElementById("secretBtn").onclick=()=>{

document.getElementById("secretMsg").style.display="block"

}

</script>

</body>
</html>
