<!DOCTYPE html>
<html>
<head>

<style>

body{
background:linear-gradient(135deg,#ffc4dd,#ffeaf6);
font-family:Poppins;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:40px;
border-radius:25px;
text-align:center;
}

button{
background:#ff3f8e;
color:white;
border:none;
padding:15px 25px;
border-radius:30px;
font-size:18px;
}

.cake{
font-size:80px;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>Ishi's Birthday 🎀</h1>

<div id="timer"></div>

<button id="giftBtn" disabled>🎁 Open Surprise</button>

<div id="cake"></div>

</div>

<script>

const birthday=new Date("March 22 2026").getTime()

const btn=document.getElementById("giftBtn")

const timer=setInterval(()=>{

const now=new Date().getTime()

const distance=birthday-now

if(distance<0){

clearInterval(timer)

btn.disabled=false

document.getElementById("timer").innerHTML="🎉 It's Birthday!"

}

},1000)

btn.onclick=()=>{

document.getElementById("cake").innerHTML="🎂 Happy Birthday Ishi!"

}

</script>

</body>
</html>
