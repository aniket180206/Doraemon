<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ishi Turns 6 🎀</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Pacifico&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#ffc6e0,#ffdff0,#ffeef7);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.container{
background:rgba(255,255,255,0.9);
backdrop-filter:blur(15px);
padding:50px;
border-radius:30px;
box-shadow:0 25px 60px rgba(0,0,0,.15);
max-width:700px;
text-align:center;
}

h1{
font-family:'Pacifico',cursive;
font-size:42px;
color:#ff3f8e;
margin-bottom:10px;
}

.subtitle{color:#ff6fa5;margin-bottom:20px}

#timer{
font-size:32px;
font-weight:600;
margin:25px 0;
color:#ff3f8e;
}

button{
background:linear-gradient(135deg,#ff69b4,#ff3f8e);
border:none;
color:white;
padding:16px 30px;
font-size:18px;
border-radius:40px;
cursor:pointer;
box-shadow:0 10px 25px rgba(255,77,148,.4);
transition:.3s;
margin:10px;
}

button:hover{transform:scale(1.08)}

button:disabled{
background:#ddd;
box-shadow:none;
cursor:not-allowed;
}

/* slideshow */
.slideshow{
margin-top:25px;
position:relative;
height:260px;
overflow:hidden;
border-radius:20px;
}

.slide{
position:absolute;
